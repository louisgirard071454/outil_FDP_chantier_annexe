  async function openChantier(chantierId) {
    state.currentChantierId = chantierId;
    await loadChantierData(chantierId);
    navigate('chantier');
  }

  async function loadChantierData(chantierId) {
    const [chantier, postes, tasks, progress, allDosi] = await Promise.all([
      DB.Chantiers.get(chantierId),
      DB.Postes.getAll(chantierId),
      DB.Tasks.getAll(chantierId),
      DB.Progress.getAllForChantier(chantierId),
      DB.Dosimetry.getAllForChantier(chantierId),
    ]);
    postes.sort((a,b)=>a.numero-b.numero);
    tasks.sort((a,b)=>a.ordre-b.ordre);
    const progressMap = Logic.buildProgressMap(progress);
    state.chantierData = { chantier, postes, tasks, progressMap, allDosi };
    // Update header
    $('#header-chantier-name').textContent = chantier.nom + ' — ' + chantier.site;
  }

        switchAhead.classList.toggle('on', state.showAheadTasks);
        const liveMap = state.chantierData ? state.chantierData.progressMap : progressMap;
        const freshItems = Logic.getTasksForPoste(posteNum, tasks, liveMap, state.showAheadTasks);
        renderTasksContainer(freshItems, isCurrent && state.taskEditMode, poste.id, isCurrent, state._taskPhotosMap);
      };
    }

    // Bouton Modifier / Enregistrer les avancements (mode édition verrouillé)
    // Par défaut les sliders sont désactivés — l'utilisateur doit appuyer sur Modifier
    if (!state.hasOwnProperty('taskEditMode')) state.taskEditMode = false;
    const btnToggleEdit = $('#btn-toggle-edit');
    if (btnToggleEdit) {
      const updateEditBar = () => {
        const bar   = $('#edit-mode-bar');
        const label = $('#edit-mode-label');
        if (!bar) return;
        if (state.taskEditMode) {
          bar.style.background = '#e8f8d8';
          bar.style.border     = '1.5px solid #76C512';
          label.innerHTML = '✏️ <strong>Mode modification activé</strong> — ajustez les curseurs puis appuyez sur Enregistrer';
          label.style.color = '#2d5c00';
          btnToggleEdit.textContent = '💾 Enregistrer';
          btnToggleEdit.className   = 'btn btn-success btn-sm';
        } else {
          bar.style.background = '#f0f4f7';
          bar.style.border     = 'none';
          label.innerHTML = '🔒 Les curseurs sont verrouillés — appuyez sur <strong>Modifier</strong> pour saisir les avancements';
          label.style.color = '#4a6070';
          btnToggleEdit.textContent = '✏️ Modifier';
          btnToggleEdit.className   = 'btn btn-warning btn-sm';
        }
        // Re-render tasks avec ou sans sliders actifs
        const liveMap = state.chantierData ? state.chantierData.progressMap : progressMap;
        const freshItems = Logic.getTasksForPoste(posteNum, tasks, liveMap, state.showAheadTasks);
        renderTasksContainer(freshItems, state.taskEditMode, poste.id, isCurrent, state._taskPhotosMap);
      };

      btnToggleEdit.onclick = async () => {
        if (state.taskEditMode) {
          // === MODE ENREGISTREMENT ===
          // Lire les valeurs depuis les sliders cachés (mis à jour par le thumb custom)
          const sliders = $$('.task-slider', $('#tasks-container'));
          let saved = 0;
          for (const slider of sliders) {
            const val = parseInt(slider.value) / 100;
            await saveTaskProgress(slider.dataset.taskid, val, posteNum, state.currentChantierId, poste.id);
            saved++;
          }
          state.taskEditMode = false;
          updateEditBar();
          showToast('✅ ' + saved + ' avancement' + (saved > 1 ? 's' : '') + ' enregistré' + (saved > 1 ? 's' : ''), 'success');
        } else {
          // === MODE MODIFICATION ===
          state.taskEditMode = true;
          updateEditBar();
        }
      };

      // Initialiser la barre au bon état (lecture seule par défaut)
      updateEditBar();
    }

    // Bouton "Ajouter une tâche non prévue"
    const btnAddUnplanned = $('#btn-add-unplanned');
    if (btnAddUnplanned) {
      btnAddUnplanned.onclick = () => showAddUnplannedTaskModal(poste, tasks, progressMap);
    }

    // Commentaire save
    const btnSaveComm = $('#btn-save-commentaire');
    if (btnSaveComm) {
      btnSaveComm.onclick = async () => {
        poste.commentaire = $('#input-commentaire').value.trim();
        poste.pointsBloquants = $('#input-bloquants').value.trim();
        await DB.Postes.save(poste);
        showToast('Commentaire sauvegardé', 'success');
      };
    }

    // Auto-save commentaire on blur
    ['#input-commentaire','#input-bloquants'].forEach(sel => {
      const inp = $(sel);
      if (!inp) return;
      inp.addEventListener('blur', async () => {
        poste.commentaire = $('#input-commentaire').value.trim();
        poste.pointsBloquants = $('#input-bloquants').value.trim();
        await DB.Postes.save(poste);
      });
    });

    // Dosi add
    const btnAddDosi = $('#btn-add-dosi');
    if (btnAddDosi) btnAddDosi.onclick = () => showAddDosiModal(poste, chantier, allDosi);

    // Photo générale
    const btnPhoto = $('#btn-take-photo');
    if (btnPhoto) btnPhoto.onclick = () => showPhotoModal(poste, 'general');

    // Photo pré-start meeting
    const btnPrestart = $('#btn-photo-prestart');
    if (btnPrestart) btnPrestart.onclick = () => showPhotoModal(poste, 'prestart');

    // Les clics photo/badge sont gérés directement dans renderTasksContainer via onclick

    // Close poste
    const btnClose = $('#btn-close-poste');
    if (btnClose) btnClose.onclick = async () => {
      // Re-fetch dosi live from DB to avoid stale closure
      const freshDosi = await DB.Dosimetry.getAllForPoste(poste.id);
      closePoste(poste, chantier, postes, freshDosi);
    };

    // Render tasks, dosi, photos
    // Toujours commencer en lecture seule (mode édition = false au chargement)
    renderTasksContainer(
      Logic.getTasksForPoste(posteNum, tasks, progressMap, state.showAheadTasks),
      false,
      poste.id,
      isCurrent,
      state._taskPhotosMap  // photos inline sous chaque tâche
    );
    renderDosiList(dosiList, chantier, isCurrent, poste);
    // Grille pré-start
    renderPhotoGrid(photos.filter(p => p.type === 'prestart'), isCurrent, poste, 'prestart', 'photo-grid-prestart');
    // Grille photos générales (tout sauf prestart et task)
    renderPhotoGrid(photos.filter(p => p.type !== 'prestart' && p.type !== 'task'), isCurrent, poste, 'general', 'photo-grid');
  }

  function renderTasksContainer(taskItems, editable, posteId, photoEnabled, taskPhotosMap) {
    const cont = $('#tasks-container');
    if (!cont) return;
    if (!taskItems.length) {
      cont.innerHTML = `<div class="empty-state" style="padding:20px 0"><div class="es-icon">✅</div><div class="es-title">Aucune tâche</div><div class="es-text">Aucune tâche planifiée pour ce poste.</div></div>`;
      return;
    }
    cont.innerHTML = '';

    // Grouper les tâches par catégorie
    const groups = {
      reporte:           { label: '⚠ Tâches reportées du poste précédent', color: '#FF9600', bg: '#fffbf0', border: '#FF9600', items: [] },
      planifie:          { label: '📋 Tâches planifiées sur ce poste',      color: '#002439', bg: '#f5f8fa', border: '#002439', items: [] },
      avance:            { label: '⏭ Tâches en avance (poste suivant)',     color: '#0059CE', bg: '#f0f5ff', border: '#0059CE', items: [] },
      non_prevu:         { label: '➕ Tâches ajoutées hors planning',        color: '#76C512', bg: '#f5fbf0', border: '#76C512', items: [] },
      termine_precedent: { label: '✅ Terminées au poste précédent',         color: '#70BD95', bg: '#f0faf5', border: '#70BD95', items: [] },
    };

    for (const item of taskItems) {
      const g = groups[item.tag];
      if (g) g.items.push(item);
    }

    const groupOrder = ['reporte', 'planifie', 'avance', 'non_prevu', 'termine_precedent'];

    for (const groupKey of groupOrder) {
      const group = groups[groupKey];
      if (!group.items.length) continue;

      // En-tête de groupe
      const header = el('div', '');
      header.innerHTML = `
        <div style="display:flex;align-items:center;gap:8px;margin:12px 0 6px;padding:6px 10px;background:${group.bg};border-left:4px solid ${group.color};border-radius:0 6px 6px 0">
          <span style="font-size:13px;font-weight:800;color:${group.color}">${group.label}</span>
          <span style="margin-left:auto;font-size:11px;font-weight:700;background:${group.color};color:white;padding:2px 7px;border-radius:12px">${group.items.length}</span>
        </div>`;
      cont.appendChild(header);

      // Encadré du groupe
      const groupBox = el('div', '');
      groupBox.style.cssText = `border:1.5px solid ${group.color}30;border-radius:10px;padding:8px;margin-bottom:8px;background:${group.bg}`;

      for (const item of group.items) {
        const { task, progress, isDone, tag } = item;
        const pct = Math.round((progress || 0) * 100);

        const div = el('div', `task-item ${isDone?'done':''}`);
        div.style.cssText = 'background:white;margin-bottom:6px;border:1px solid #e4edf3';

        // Nb de photos liées à cette tâche (badge)
        const taskPhotoCount = (state._taskPhotoCounts && state._taskPhotoCounts[task.id]) || 0;

        div.innerHTML = `
          <div class="task-header">
            <div class="task-name ${isDone?'task-done':''}">${task.intitule}</div>
            <div style="display:flex;gap:4px;align-items:center">
              ${taskPhotoCount > 0 ? `<span class="badge badge-info badge-task-photos" data-taskid="${task.id}" data-taskname="${task.intitule.replace(/"/g,'&quot;').slice(0,40)}" style="font-size:10px;cursor:pointer" title="Voir les photos de cette tâche">📷 ${taskPhotoCount}</span>` : ''}
              <span class="badge ${isDone?'badge-success':pct>0?'badge-warning':'badge-gray'}">${pct}%</span>
            </div>
          </div>
          <div class="task-meta" style="margin-bottom:4px;display:flex;align-items:center;gap:6px">
            <span class="badge badge-gray" style="font-size:10px">P${task.posteDebut}→P${task.posteFin}</span>
            ${photoEnabled ? `<button class="btn-task-photo btn btn-secondary btn-sm" data-taskid="${task.id}" data-taskname="${task.intitule.replace(/"/g,'&quot;').slice(0,40)}" style="height:26px;padding:0 8px;font-size:11px;margin-left:auto">📷 Photo preuve</button>` : ''}
          </div>
          ${editable && tag !== 'termine_precedent' ? `
          <div class="task-slider-row" style="margin-top:10px;padding-top:8px;border-top:1px solid #f0f3f6">
            <input type="range" min="0" max="100" value="${pct}" class="task-slider" data-taskid="${task.id}" style="display:none">
            <div class="custom-slider-wrap" data-taskid="${task.id}">
              <div class="custom-slider-track">
                <div class="custom-slider-fill" style="width:${pct}%"></div>
                <div class="custom-slider-thumb" style="left:${pct}%" title="Glissez pour modifier"></div>
              </div>
            </div>
            <div class="slider-value" style="font-size:16px;min-width:52px;text-align:right;font-weight:800">${pct}%</div>
          </div>` : `
          <div class="progress-wrap" style="margin-top:4px"><div class="progress-bar ${pct<100?'orange':''}" style="width:${pct}%"></div></div>`}
        `;
        groupBox.appendChild(div);

        // ── Photos inline sous la tâche ──────────────────────────────
        const taskPics = (taskPhotosMap && taskPhotosMap[task.id]) || [];
        if (taskPics.length > 0) {
          const photoStrip = document.createElement('div');
          photoStrip.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;padding:10px 0 4px;margin-top:8px;border-top:1px solid #e4edf3';
          taskPics.forEach(photo => {
            const imgSrc = photo.annotation || photo.data;
            const thumb = document.createElement('div');
            thumb.style.cssText = 'position:relative;border-radius:6px;overflow:hidden;cursor:pointer;width:64px;height:64px;background:#e4edf3;flex-shrink:0';
            thumb.innerHTML = `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover;display:block" loading="lazy">`;
            // Clic → agrandir/annoter
            thumb.onclick = (e) => {
              e.stopPropagation();
              showPhotoViewer(photo, photoEnabled, state.currentPoste);
            };
            photoStrip.appendChild(thumb);
          });
          // Ajouter la strip directement dans le div de la tâche
          div.appendChild(photoStrip);
        }

        // Direct onclick on "Photo preuve" button
        const photoBtn = div.querySelector('.btn-task-photo');
        if (photoBtn) {
          photoBtn.onclick = (e) => {
            e.stopPropagation();
            const currentPoste = state.currentPoste;
            if (currentPoste) {
              showPhotoModal(currentPoste, 'task', task.id, task.intitule);
            }
          };
        }

        // Retirer le badge photo (remplacé par les miniatures inline)
        const photoBadge = div.querySelector('.badge-task-photos');
        if (photoBadge) photoBadge.remove();

      }
      cont.appendChild(groupBox);
    }
    // Slider custom thumb-only — seul le pouce est interactif
    if (editable) {
      $$('.custom-slider-wrap', cont).forEach(wrap => {
        const taskId   = wrap.dataset.taskid;
        const track    = wrap.querySelector('.custom-slider-track');
        const fill     = wrap.querySelector('.custom-slider-fill');
        const thumb    = wrap.querySelector('.custom-slider-thumb');
        const hidden   = cont.querySelector(`input.task-slider[data-taskid="${taskId}"]`);
        const valEl    = wrap.closest('.task-slider-row') && wrap.closest('.task-slider-row').querySelector('.slider-value');

        let dragging = false;
        let debounceTimer;

        function pctFromEvent(e) {
          const rect = track.getBoundingClientRect();
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const raw = (clientX - rect.left) / rect.width;
          return Math.round(Math.min(1, Math.max(0, raw)) * 100);
        }

        function applyPct(pct) {
          fill.style.width  = pct + '%';
          thumb.style.left  = pct + '%';
          if (hidden) hidden.value = pct;
          if (valEl)  valEl.textContent = pct + '%';
          // Mettre à jour l'état done + badge pourcentage uniquement
          const taskItem = wrap.closest('.task-item');
          if (taskItem) {
            if (pct >= 100) taskItem.classList.add('done'); else taskItem.classList.remove('done');
            // Chercher le badge % spécifiquement (pas le badge 📷 photos)
            const allBadges = taskItem.querySelectorAll('.badge');
            for (const badge of allBadges) {
              // Le badge % est celui qui contient uniquement un nombre suivi de %
              if (/^\d+%$/.test(badge.textContent.trim())) {
                badge.textContent = pct + '%';
                badge.className = `badge ${pct>=100?'badge-success':pct>0?'badge-warning':'badge-gray'}`;
                break;
              }
            }
          }
          // Debounced save
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(() => {
            saveTaskProgress(taskId, pct/100, state.currentPosteNum, state.currentChantierId, posteId);
          }, 500);
        }

        // ── Pointer events sur le pouce uniquement ──────────────────────
        function startDrag(e) {
          e.preventDefault();
          e.stopPropagation();
          dragging = true;
          thumb.classList.add('dragging');
          // Capture pointer for reliable drag on mobile
          if (thumb.setPointerCapture && e.pointerId !== undefined) {
            thumb.setPointerCapture(e.pointerId);
          }
        }

        function onMove(e) {
          if (!dragging) return;
          e.preventDefault();
          e.stopPropagation();
          applyPct(pctFromEvent(e));
        }

        function endDrag(e) {
          if (!dragging) return;
          dragging = false;
          thumb.classList.remove('dragging');
        }

        // Mouse events (Windows tablette / souris)
        thumb.addEventListener('mousedown',  startDrag, { passive: false });
        document.addEventListener('mousemove', (e) => { if (dragging) onMove(e); }, { passive: false });
        document.addEventListener('mouseup',   (e) => { if (dragging) endDrag(e); });

        // Touch / Pointer events (tactile Android + Windows)
        thumb.addEventListener('pointerdown', startDrag, { passive: false });
        thumb.addEventListener('pointermove', (e) => { if (dragging) onMove(e); }, { passive: false });
        thumb.addEventListener('pointerup',   endDrag);
        thumb.addEventListener('pointercancel', endDrag);
      });
    }
  }

  async function saveTaskProgress(taskId, value, posteNum, chantierId, posteId) {
    const key = `${taskId}_${posteNum}`;
    await DB.Progress.save({ key, value, chantierId, posteId, taskId, posteNum, updatedAt: new Date().toISOString() });
    // Update local map
    if (state.chantierData) state.chantierData.progressMap[key] = value;
  }

  function renderDosiList(dosiList, chantier, editable, poste) {
    const cont = $('#dosi-list');
    if (!cont) return;
    if (!dosiList.length) return;
    const rows = dosiList.map(d => `
      <tr>
        <td>${d.intervenantNom}</td>
        <td style="text-align:right;font-weight:700">${d.dose.toFixed(3)} mSv</td>
        ${editable?`<td><button class="btn btn-danger btn-sm btn-icon-only" data-dosid="${d.id}">✕</button></td>`:''}
      </tr>`).join('');
    const totalDose = dosiList.reduce((s,d)=>s+d.dose,0);
    cont.innerHTML = `
      <table class="dosi-table">
        <thead><tr><th>Intervenant</th><th>Dose</th>${editable?'<th></th>':''}</tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr style="background:#002439;color:white"><td colspan="${editable?2:1}" style="font-weight:700;padding:8px 10px">Dose collective</td><td style="text-align:right;font-weight:700;padding:8px 10px;color:#70BD95">${totalDose.toFixed(3)} mSv</td>${editable?'<td></td>':''}</tr></tfoot>
      </table>`;
    if (editable) {
      $$('[data-dosid]', cont).forEach(btn => {
        btn.onclick = async () => {
          const ok = await confirm('Supprimer dosimétrie', 'Supprimer cette entrée de dosimétrie ?', 'Supprimer', 'btn-danger');
          if (!ok) return;
          await DB.Dosimetry.delete(btn.dataset.dosid);
          const updated = await DB.Dosimetry.getAllForPoste(poste.id);
          renderDosiList(updated, chantier, editable, poste);
        };
      });
    }
  }

  // gridId: ID de l'élément DOM cible ('photo-grid', 'photo-grid-prestart')
  // photoType: 'general' | 'prestart' | 'task' — filtre pour le rechargement après suppression
  function renderPhotoGrid(photos, editable, poste, photoType, gridId) {
    gridId = gridId || 'photo-grid';
    const grid = $('#' + gridId);
    if (!grid) return;
    grid.innerHTML = '';
    if (!photos.length) {
      const emptyMsg = photoType === 'prestart'
        ? '📋 Aucune photo de tableau pré-start — appuyez sur « Photo tableau »'
        : 'Aucune photo';
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#4a6070;font-size:13px;padding:12px;font-style:italic">${emptyMsg}</div>`;
      return;
    }
    photos.forEach(photo => {
      const thumb = el('div', 'photo-thumb');
      const imgSrc = photo.annotation || photo.data;
      thumb.innerHTML = `
        <img src="${imgSrc}" loading="lazy" alt="${photo.legende||'Photo'}">
        ${photo.legende?`<div class="photo-caption">${photo.legende}</div>`:''}
        ${editable?`<button class="photo-del" data-photoid="${photo.id}">✕</button>`:''}`;
      thumb.onclick = (e) => {
        if (e.target.classList.contains('photo-del')) return;
        showPhotoViewer(photo, editable, poste);
      };
      grid.appendChild(thumb);
    });
    if (editable) {
      $$('[data-photoid]', grid).forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const ok = await confirm('Supprimer photo', 'Supprimer cette photo ?', 'Supprimer', 'btn-danger');
          if (!ok) return;
          await DB.Photos.delete(btn.dataset.photoid);
          // Recharger toutes les photos du poste et re-filtrer
          const allPhotos = await DB.Photos.getAllForPoste(poste.id);
          if (photoType === 'prestart') {
            renderPhotoGrid(allPhotos.filter(p=>p.type==='prestart'), editable, poste, 'prestart', 'photo-grid-prestart');
          } else if (photoType === 'task') {
            // Pas de grille dédiée pour task — refresh compte badges
            state._taskPhotoCounts = {};
            allPhotos.filter(p=>p.type==='task'&&p.taskId).forEach(p=>{
              state._taskPhotoCounts[p.taskId] = (state._taskPhotoCounts[p.taskId]||0)+1;
            });
          } else {
            renderPhotoGrid(allPhotos.filter(p=>p.type!=='prestart'&&p.type!=='task'), editable, poste, 'general', 'photo-grid');
          }
        };
      });
    }
  }

  // ============ CLÔTURE POSTE ============

  async function closePoste(poste, chantier, postes, dosiList) {
    const commentaire = $('#input-commentaire').value.trim();
    const pointsBloquants = $('#input-bloquants').value.trim();

    // Validation
    if (!commentaire) {
      showToast('❌ Commentaire obligatoire pour clôturer', 'error');
      $('#input-commentaire').focus();
      return;
    }
    if (!dosiList.length) {
      showToast('❌ Au moins une dosimétrie requise', 'error');
      return;
    }

    const ok = await confirm('Clôturer le poste', `Clôturer le poste ${poste.numero} ? Les données ne seront plus modifiables.`, 'Clôturer', 'btn-success');
    if (!ok) return;

    // Save and close
    poste.commentaire = commentaire;
    poste.pointsBloquants = pointsBloquants;
    poste.clos = true;
    poste.closAt = new Date().toISOString();
    await DB.Postes.save(poste);

    // Advance chantier to next poste
    const nextPoste = postes.find(p=>p.numero===poste.numero+1);
    if (nextPoste) {
      chantier.currentPosteNum = nextPoste.numero;
    } else {
      chantier.statut = 'termine';
    }
    chantier.updatedAt = new Date().toISOString();
    await DB.Chantiers.save(chantier);

    showToast(`✅ Poste ${poste.numero} clos !`, 'success');
    await loadChantierData(chantier.id);
    navigate('chantier');
  }

  // ============ MODAL: AJOUTER DOSIMÉTRIE ============

  function showAddDosiModal(poste, chantier, allDosi) {
    const intervenants = chantier.intervenants || [];
    const dosiCumul = Logic.calcDoseCumulative(allDosi);

    const overlay = el('div', 'modal-overlay');
    overlay.innerHTML = `
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">☢️ Ajouter dosimétrie</div>
        <div class="form-group">
          <label>Intervenant</label>
          <select id="dosi-interv">
            <option value="">— Sélectionner —</option>
            ${[...intervenants].sort((a,b)=>a.nom.localeCompare(b.nom,'fr')).map(i=>`<option value="${i.id}">${i.nom} — cumul: ${(dosiCumul.find(d=>d.id===i.id)?.total||0).toFixed(3)} mSv</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Dose reçue (mSv)</label>
          <input type="number" id="dosi-dose" step="0.001" min="0" placeholder="ex: 0.125">
        </div>
        <div id="dosi-alert-zone"></div>
        <div class="modal-actions">
          <button class="btn btn-secondary w-full" id="dosi-cancel">Annuler</button>
          <button class="btn btn-primary w-full" id="dosi-ok">Enregistrer</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    $('#dosi-dose', overlay).addEventListener('input', () => {
      const dose = parseFloat($('#dosi-dose', overlay).value)||0;
      const interv = intervenants.find(i=>i.id===$('#dosi-interv', overlay).value);
      if (!interv) return;
      const cumul = dosiCumul.find(d=>d.id===interv.id)?.total||0;
      const newCumul = cumul+dose;
      const alertZone = $('#dosi-alert-zone', overlay);
      if (newCumul >= chantier.seuilDosiAlerte) {
        alertZone.innerHTML = `<div class="alert alert-err"><span class="alert-icon">🚨</span><div>ALERTE: Cumul chantier atteindrait <strong>${newCumul.toFixed(3)} mSv</strong> (seuil: ${chantier.seuilDosiAlerte} mSv)</div></div>`;
      } else { alertZone.innerHTML=''; }
    });

    $('#dosi-cancel', overlay).onclick = () => overlay.remove();
    $('#dosi-ok', overlay).onclick = async () => {
      const intervId = $('#dosi-interv', overlay).value;
      const dose = parseFloat($('#dosi-dose', overlay).value);

  // Helper : compresse une image (redimensionne + JPEG) avant stockage.
  // Réduit fortement la taille en mémoire et celle des exports JSON/ZIP,
  // tout en gardant une qualité suffisante pour la documentation chantier.
  // Retombe sur l'image d'origine si la compression échoue.
  function compressImage(file, maxDim = 1600, quality = 0.72) {
    return new Promise((resolve) => {
      const fr = new FileReader();
      fr.onload = () => {
        const dataUrl = fr.result;
        const img = new Image();
        img.onload = () => {
          try {
            const w0 = img.naturalWidth || img.width;
            const h0 = img.naturalHeight || img.height;
            const scale = Math.min(1, maxDim / Math.max(w0, h0));
            // Petite image déjà légère : on la garde telle quelle
            if (scale >= 1 && file.size < 350 * 1024) { resolve(dataUrl); return; }
            const w = Math.max(1, Math.round(w0 * scale));
            const h = Math.max(1, Math.round(h0 * scale));
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const out = canvas.toDataURL('image/jpeg', quality);
            // Sécurité : si le résultat est plus lourd (rare), garder l'original
            resolve(out && out.length < dataUrl.length ? out : dataUrl);
          } catch (e) { resolve(dataUrl); }
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      };
      fr.onerror = () => resolve(null);
      fr.readAsDataURL(file);
    });
  }

  // Helper : lire un fichier en base64
  function readFileAsDataURL(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = (e) => resolve(e.target.result);
      reader.onerror = ()  => reject(new Error('Lecture impossible'));
      reader.readAsDataURL(file);
    });
  }

          <button class="btn btn-secondary btn-sm" id="ann-clear">Effacer annotations</button>
          <input type="color" id="ann-color" value="#FF0000" style="height:36px;width:44px;border:none;border-radius:6px;padding:2px;cursor:pointer">
          <select id="ann-size" style="height:36px;font-size:13px;border-radius:6px;border:1.5px solid #d0dbe5;padding:0 8px">
            <option value="3">Fin</option>
            <option value="6" selected>Moyen</option>
            <option value="12">Épais</option>
          </select>
        </div>
        ${editable?`<div class="form-group">
          <label>Légende</label>
          <input type="text" id="viewer-legende" value="${photo.legende||''}">
        </div>`:''}
        <div class="modal-actions">
          <button class="btn btn-secondary w-full" id="viewer-close">Fermer</button>
          ${editable?`<button class="btn btn-success w-full" id="viewer-save">💾 Sauvegarder</button>`:''}
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const canvas = $('#annotation-canvas', overlay);
    const ctx = canvas.getContext('2d');
    const img = new Image();
    const imgSrc = photo.annotation || photo.data;
    let drawing = false;
    let lastX, lastY;

    img.onload = () => {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
    };
    img.src = imgSrc;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const src = e.touches ? e.touches[0] : e;
      return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
    }

    ['mousedown','touchstart'].forEach(ev => canvas.addEventListener(ev, (e) => {
      e.preventDefault();
      drawing = true;
      const pos = getPos(e);
      lastX = pos.x; lastY = pos.y;
    }, { passive: false }));

    ['mousemove','touchmove'].forEach(ev => canvas.addEventListener(ev, (e) => {
      e.preventDefault();
      if (!drawing) return;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.strokeStyle = $('#ann-color', overlay).value;
      ctx.lineWidth = parseInt($('#ann-size', overlay).value) * (canvas.width/300);
      ctx.lineCap = 'round';
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      lastX = pos.x; lastY = pos.y;
    }, { passive: false }));

    ['mouseup','touchend'].forEach(ev => canvas.addEventListener(ev, () => drawing = false));

    $('#ann-clear', overlay).onclick = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };

    $('#viewer-close', overlay).onclick = () => overlay.remove();

    const saveBtn = $('#viewer-save', overlay);
    if (saveBtn) {
      saveBtn.onclick = async () => {
        photo.annotation = canvas.toDataURL('image/jpeg', 0.85);
        const legendeEl = $('#viewer-legende', overlay);
        if (legendeEl) photo.legende = legendeEl.value.trim();
        await DB.Photos.save(photo);
        overlay.remove();
        const updated = await DB.Photos.getAllForPoste(poste.id);
        renderPhotoGrid(updated, true, poste);
        showToast('Photo annotée sauvegardée', 'success');
      };
    }

    overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  }

  function showImportPlanningModal() {
    const overlay = el('div', 'modal-overlay center');
    overlay.innerHTML = `
      <div class="modal-sheet" style="max-width:500px;width:100%">
        <div class="modal-title">📊 Import planning Excel</div>
        <div class="alert alert-info" style="margin-bottom:12px">
          <span class="alert-icon">ℹ️</span>
          <div>Colonnes attendues :<br>Col A: Avancement initial (0-100% ou 0-1)<br>Col B: Intitulé de la tâche<br>Col C: Poste de départ<br>Col D: Poste de fin<br>La ligne d'en-tête est détectée automatiquement.</div>
        </div>
        <div class="drop-zone" id="import-drop">
          <div class="dz-icon">📊</div>
          <div class="dz-text">Appuyer pour sélectionner le fichier Excel</div>
          <div class="dz-sub">.xlsx, .xls</div>
        </div>
        <input type="file" id="import-input" accept=".xlsx,.xls,.csv" style="display:none">
        <div id="import-status" style="margin-top:12px"></div>
        <div class="modal-actions" style="margin-top:12px">
          <button class="btn btn-secondary w-full" id="import-cancel">Annuler</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const doImport = async (file) => {
      const statusEl = $('#import-status', overlay);
      statusEl.innerHTML = `<div class="alert alert-info"><span class="spinner" style="width:18px;height:18px;border-width:3px"></span> Import en cours...</div>`;
      try {
        const { chantier } = state.chantierData;
        let tasks;
        if (file.name.endsWith('.csv')) {
          const text = await file.text();
          tasks = Logic.parseCSVPlanning(text, chantier.id);
        } else {
          // Use XLSXReader (local lib basée JSZip) ou SheetJS si disponible
          let wb;
          if (typeof XLSXReader !== 'undefined') {
            wb = await XLSXReader.read(file);
          } else if (typeof XLSX !== 'undefined') {
            const ab = await file.arrayBuffer();
            wb = await XLSX.read(ab, { type: 'array' });
          } else {
            statusEl.innerHTML = `<div class="alert alert-warn"><span class="alert-icon">⚠️</span>Bibliothèque Excel non disponible. Renommez le fichier en .csv ou réessayez.</div>`;
            return;
          }
          tasks = Logic.parseExcelPlanning(wb, chantier.id);
        }
        await DB.Tasks.clearChantier(chantier.id);
        await DB.Tasks.bulkSave(tasks);
        await loadChantierData(chantier.id);
        statusEl.innerHTML = `<div class="alert alert-ok"><span class="alert-icon">✅</span>${tasks.length} tâches importées avec succès !</div>`;
        setTimeout(() => { overlay.remove(); renderChantierHome(); }, 1500);
      } catch (err) {
        statusEl.innerHTML = `<div class="alert alert-err"><span class="alert-icon">❌</span>Erreur: ${err.message}</div>`;
      }
    };

    $('#import-drop', overlay).onclick = () => $('#import-input', overlay).click();
    $('#import-input', overlay).onchange = (e) => { if(e.target.files[0]) doImport(e.target.files[0]); };
    $('#import-cancel', overlay).onclick = () => overlay.remove();
    overlay.onclick = (e)=>{if(e.target===overlay)overlay.remove();};
  }

  async function renderGlobalView() {
    if (!state.currentChantierId) { navigate('home'); return; }
    const { chantier, postes, tasks, progressMap } = state.chantierData;
    const globalPct = Logic.getGlobalProgress(tasks.filter(t=>!t.isSection), progressMap, postes.length);

    const cont = $('#view-global');
    cont.innerHTML = `
      <h2 style="font-size:18px;font-weight:900;color:#002439;margin-bottom:14px">Vue globale — ${chantier.nom}</h2>

      <div class="card" style="background:linear-gradient(135deg,#002439,#0a3a52);color:white;margin-bottom:12px">
        <div style="font-size:36px;font-weight:900;text-align:center;padding:8px 0">${Math.round(globalPct*100)}%</div>
        <div class="progress-wrap" style="background:rgba(255,255,255,0.2);height:14px;margin:8px 0">
          <div class="progress-bar" style="width:${Math.round(globalPct*100)}%;background:#76C512"></div>
        </div>
        <div style="text-align:center;font-size:13px;color:#70BD95">Avancement global chantier</div>
      </div>

      <div id="planning-global"></div>
    `;

    const pg = $('#planning-global');
    const totalPostes = postes.length;
    let currentSection = null;

    for (const task of tasks) {
      if (task.isSection) {
        currentSection = el('div','');
        currentSection.innerHTML = `<div class="task-item section-header">${task.intitule}</div>`;
        pg.appendChild(currentSection);
        continue;
      }
      let bestPct = task.avancementInitial;
      for (let p=1;p<=totalPostes;p++){const v=progressMap[`${task.id}_${p}`];if(v!==undefined&&v>bestPct)bestPct=v;}
      const pct = Math.round(bestPct*100);
      const isDone = pct>=100;
      const started = pct>0;

      const row = el('div', `task-item ${isDone?'done':''}`);
      row.innerHTML = `
        <div class="task-header">
          <div class="task-name ${isDone?'task-done':''}" style="font-size:13px">${task.intitule}</div>
          <span class="badge ${isDone?'badge-success':started?'badge-warning':'badge-gray'}">${pct}%</span>
        </div>
        <div class="task-meta">
          <span class="badge badge-gray" style="font-size:10px">P${task.posteDebut}→P${task.posteFin}</span>
        </div>
        <div class="progress-wrap" style="height:6px">
          <div class="progress-bar ${isDone?'':'orange'}" style="width:${pct}%"></div>
        </div>`;
      pg.appendChild(row);
    }
  }

  // ── Partage ou envoi par mail ───────────────────────────────────────
  // RÉALITÉ TECHNIQUE : depuis file://, aucun navigateur ne peut joindre
  // un fichier à un email automatiquement. La seule solution robuste est :
  // 1. Télécharger le fichier dans les Téléchargements (automatique)
  // 2. Copier le contenu du mail dans le presse-papiers
  // 3. Ouvrir Gmail pré-rempli via deep link (to + subject + body)
  // 4. L'utilisateur joint le fichier en 1 tap : 📎 → Téléchargements
  async function shareOrMailFile(blob, filename, chantier, type) {
    const dest   = (chantier.emailDestinataires || '').trim();
    const now    = new Date().toLocaleDateString('fr-FR');
    const nom    = chantier.nom;
    const site   = chantier.site || '';

    const subjects = {
      excel: 'Rapport avancement - ' + nom + ' - ' + now,
      json:  'Sauvegarde chantier - ' + nom + ' - ' + now,
      zip:   'Photos chantier - ' + nom + ' - ' + now,
    };
    const bodyLines = {
      excel: [
        'Bonjour,',
        '',
        'Veuillez trouver ci-joint le rapport d\'avancement du chantier ' + nom + ' (' + site + ').',
        'Date du rapport : ' + now,
        '',
        'Cordialement,',
        'Ineo Nucleaire',
      ],
      json: [
        'Bonjour,',
        '',
        'Veuillez trouver ci-joint la sauvegarde complete du chantier ' + nom + '.',
        'Date : ' + now,
        '',
        'Cordialement,',
        'Ineo Nucleaire',
      ],
      zip: [
        'Bonjour,',
        '',
        'Veuillez trouver ci-joint les photos du chantier ' + nom + '.',
        'Date : ' + now,
        '',
        'Cordialement,',
        'Ineo Nucleaire',
      ],
    };

    const subject  = subjects[type]  || filename;
    const bodyText = (bodyLines[type] || ['Bonjour,']).join('\n');
    const typeLabels = { excel: 'rapport Excel', json: 'sauvegarde JSON', zip: 'photos ZIP' };
    const label    = typeLabels[type] || 'fichier';

    // Étape 1 : télécharger le fichier dans les Téléchargements
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href     = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);

    // Attendre que le téléchargement soit lancé
    await new Promise(r => setTimeout(r, 700));

    // Étape 2 : afficher le modal d'envoi
    showSendModal(filename, dest, subject, bodyText, label, type);
  }

  // ── Modal envoi — copie presse-papiers + deep link Gmail ──────────────
  function showSendModal(filename, dest, subject, bodyText, label, type) {

    // Détection système : Windows vs Android vs autre
    const isWindows = /Windows/i.test(navigator.userAgent);
    const isMac     = /Mac/i.test(navigator.userAgent) && !/iPhone|iPad/.test(navigator.userAgent);
    const isDesktop = isWindows || isMac;

    // Construction du lien mailto: — fonctionne NATIVEMENT sur Windows (Outlook / Windows Mail)
    // Sur Windows le body dans mailto: est correctement interprété par Outlook
    const encSubj = encodeURIComponent(subject);
    const encBody = encodeURIComponent(bodyText);
    const encTo   = encodeURIComponent(dest);
    const mailtoLink  = 'mailto:' + encTo + '?subject=' + encSubj + '&body=' + encBody;
    const outlookLink = 'ms-outlook://compose?to=' + encTo + '&subject=' + encSubj + '&body=' + encBody;

    // Sur Windows : le dossier Téléchargements est accessible
    const downloadsNote = isWindows
      ? 'Le fichier est dans <strong>C:\\\\Utilisateurs\\\\[votre nom]\\\\Téléchargements</strong>'
      : 'Le fichier est dans votre dossier <strong>Téléchargements</strong>';

    const overlay = el('div', 'modal-overlay center');
    overlay.style.zIndex = '600';
    overlay.innerHTML = `
      <div class="modal-sheet" style="max-width:500px;width:100%;max-height:92vh;overflow-y:auto">
        <div class="modal-handle"></div>
        <div class="modal-title" style="margin-bottom:12px">✉️ Envoyer le ${label}</div>

        <!-- Fichier téléchargé -->
        <div class="alert alert-ok" style="margin-bottom:14px">
          <span class="alert-icon">✅</span>
          <div>
            <strong>Fichier enregistré dans vos Téléchargements</strong><br>
            <span style="font-family:monospace;font-size:11px;color:#2d5c00">${filename}</span><br>
            <span style="font-size:11px;color:#4a6070">${downloadsNote}</span>
          </div>
        </div>

        <!-- Destinataire -->
        ${dest

        ${isDesktop ? `
        <!-- VERSION WINDOWS / PC : flux simplifié en 2 étapes -->
        <div style="font-size:13px;font-weight:800;color:#002439;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">Procédure</div>

        <!-- Étape 1 : ouvrir Outlook avec tout pré-rempli -->
        <div style="border:2px solid #0059CE;border-radius:12px;padding:14px;margin-bottom:10px;background:#f5f9ff">
          <div style="display:flex;gap:12px;align-items:flex-start">
            <div style="width:32px;height:32px;background:#0059CE;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0">1</div>
            <div style="flex:1">
              <div style="font-size:14px;font-weight:700;margin-bottom:3px">Ouvrir votre messagerie</div>
              <div style="font-size:12px;color:#4a6070;margin-bottom:10px">
                Destinataire, sujet et corps du mail seront <strong>automatiquement pré-remplis</strong> dans Outlook ou votre messagerie par défaut.
              </div>
              <div style="display:flex;flex-direction:column;gap:6px">
                <a href="${mailtoLink}" class="btn btn-primary btn-block btn-lg" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px">
                  <span style="font-size:18px">✉️</span> Ouvrir Outlook / messagerie par défaut
                </a>
                <a href="${outlookLink}" class="btn btn-secondary btn-block" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;height:38px;font-size:13px">
                  <span style="font-size:15px">📧</span> Ouvrir Outlook (lien direct)
                </a>
              </div>
            </div>
          </div>
        </div>

        <!-- Étape 2 : joindre le fichier -->
        <div style="border:2px solid #76C512;border-radius:12px;padding:14px;margin-bottom:14px;background:#f9fff5">
          <div style="display:flex;gap:12px;align-items:flex-start">
            <div style="width:32px;height:32px;background:#76C512;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0">2</div>
            <div style="flex:1">
              <div style="font-size:14px;font-weight:700;margin-bottom:3px">Joindre le fichier dans Outlook</div>
              <div style="font-size:12px;color:#4a6070;line-height:1.6">
                Dans Outlook → onglet <strong>Insertion</strong> → <strong>Joindre un fichier</strong><br>
                → <strong>Téléchargements</strong> → sélectionnez :<br>
                <code style="background:#e8f8d8;padding:2px 8px;border-radius:4px;color:#2d5c00;font-size:11px">${filename}</code>
              </div>
            </div>
          </div>
        </div>

        ` : `
        <!-- VERSION MOBILE / ANDROID -->
        <div style="font-size:13px;font-weight:800;color:#002439;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">Procédure en 3 étapes</div>

        <div style="border:1.5px solid #0059CE;border-radius:10px;padding:12px;margin-bottom:8px">
          <div style="display:flex;gap:10px;align-items:flex-start">
            <div style="width:28px;height:28px;background:#0059CE;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">1</div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:700;margin-bottom:8px">Ouvrir votre messagerie</div>
              <div style="display:flex;flex-direction:column;gap:6px">
                <a href="${mailtoLink}" class="btn btn-primary btn-block" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;height:42px">
                  ✉️ Ouvrir la messagerie
                </a>
              </div>
            </div>
          </div>
        </div>

        <div style="border:1.5px solid #d0dbe5;border-radius:10px;padding:12px;margin-bottom:8px">
          <div style="display:flex;gap:10px;align-items:flex-start">
            <div style="width:28px;height:28px;background:#4a6070;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">2</div>
            <div style="font-size:13px;line-height:1.4">
              <strong>Corps du mail</strong> — si non pré-rempli, copiez-le :
            </div>
          </div>
        </div>

        <div style="border:1.5px solid #76C512;border-radius:10px;padding:12px;margin-bottom:14px;background:#f9fff5">
          <div style="display:flex;gap:10px;align-items:flex-start">
            <div style="width:28px;height:28px;background:#76C512;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">3</div>
            <div style="font-size:12px;color:#4a6070;line-height:1.5">
              Dans votre mail → <strong>📎</strong> → <strong>Joindre un fichier</strong> → <strong>Téléchargements</strong><br>
              → <code style="font-size:11px;background:#e8f8d8;padding:1px 6px;border-radius:4px;color:#2d5c00">${filename}</code>
            </div>

        <!-- Corps du mail (copie presse-papiers) -->
        <div style="background:#f0f4f7;border-radius:10px;padding:10px;margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;color:#4a6070;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Corps du mail</div>
