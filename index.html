        </div>

        <button class="btn btn-secondary btn-block" id="send-modal-close">Fermer</button>
      </div>`;

    document.body.appendChild(overlay);

    // Copier le corps dans le presse-papiers
    const btnCopy = $('#btn-copy-body', overlay);
    if (btnCopy) {
      btnCopy.onclick = async () => {
        try {
          await navigator.clipboard.writeText(bodyText);
          btnCopy.textContent = '✅ Copié dans le presse-papiers !';
          btnCopy.style.background = '#76C512';
          btnCopy.style.color = 'white';
          setTimeout(() => {
            btnCopy.innerHTML = '📋 Copier le corps du mail dans le presse-papiers';
            btnCopy.style.background = '';
            btnCopy.style.color = '';
          }, 2500);
        } catch(e) {
          // Fallback : sélection du texte
          const range = document.createRange();
          const textEl = btnCopy.previousElementSibling;
          if (textEl) { range.selectNode(textEl); window.getSelection().removeAllRanges(); window.getSelection().addRange(range); }
          showToast('Appuyez sur Ctrl+C pour copier', 'info', 3000);
        }
      };
    }

    $('#send-modal-close', overlay).onclick = () => overlay.remove();
    overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
  }


  // ============ MODAL: AJOUTER TÂCHE NON PRÉVUE ============

  function showAddUnplannedTaskModal(poste, tasks, progressMap) {
    // Tâches éligibles : toutes les tâches non-section du chantier
    const eligible = tasks.filter(t => !t.isSection && t.posteDebut > 0);

    // Regrouper par section pour faciliter la sélection
    const sections = [];
    let currentSection = 'Général';
    for (const t of tasks) {
      if (t.isSection) { currentSection = t.intitule; continue; }
      if (!t.isSection && t.posteDebut > 0) {
        sections.push({ task: t, section: currentSection });
      }
    }

    const overlay = el('div', 'modal-overlay');
    overlay.innerHTML = `
      <div class="modal-sheet" style="max-height:92vh">
        <div class="modal-handle"></div>
        <div class="modal-title">➕ Tâche non prévue au poste ${poste.numero}</div>
        <div class="alert alert-info" style="margin-bottom:12px">
          <span class="alert-icon">ℹ️</span>
          <div>Sélectionnez une tâche du planning qui a été avancée lors de ce poste et saisissez son avancement réel.</div>
        </div>

        <div class="form-group">
          <label>Rechercher une tâche</label>
          <input type="text" id="unplanned-search" placeholder="Tapez pour filtrer les tâches...">
        </div>

        <div class="form-group">
          <label>Tâche à enregistrer</label>
          <select id="unplanned-task-select" size="6" style="height:160px">
${sections.map(function(s) {
              var t = s.task; var sec = s.section;
              var currentPct = Math.round(((progressMap[t.id + '_' + poste.numero] || t.avancementInitial) || 0) * 100);
              var prefix = sec !== 'Général' ? sec + ' › ' : '';
              return '<option value="' + t.id + '" data-section="' + sec + '" data-label="' + t.intitule.toLowerCase() + '">' + prefix + t.intitule + ' (' + currentPct + '%)</option>';
            }).join('')}
          </select>
        </div>

        <div class="form-group" id="unplanned-slider-group" style="display:none">
          <label>Avancement pour ce poste</label>
          <div style="display:flex;align-items:center;gap:10px;touch-action:none">
            <!-- Slider natif comme fallback accessible -->
            <input type="range" id="unplanned-slider" min="0" max="100" value="0" style="flex:1;height:8px;-webkit-appearance:none;border-radius:99px;background:#d0dbe5;outline:none">
            <div class="slider-value" id="unplanned-pct" style="font-size:18px;min-width:52px;font-weight:800">0%</div>
          </div>
          <div id="unplanned-task-info" style="font-size:12px;color:#4a6070;margin-top:4px"></div>
        </div>

        <div class="modal-actions">
          <button class="btn btn-secondary w-full" id="unplanned-cancel">Annuler</button>
          <button class="btn btn-primary w-full" id="unplanned-save" disabled>Enregistrer</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const searchInput = $('#unplanned-search', overlay);
    const taskSelect = $('#unplanned-task-select', overlay);
    const sliderGroup = $('#unplanned-slider-group', overlay);
    const slider = $('#unplanned-slider', overlay);
    const pctEl = $('#unplanned-pct', overlay);
    const infoEl = $('#unplanned-task-info', overlay);
    const saveBtn = $('#unplanned-save', overlay);

    // Search filter
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase();
      $$('option', taskSelect).forEach(opt => {
        const label = opt.dataset.label || '';
        opt.style.display = !q || label.includes(q) ? '' : 'none';
      });
    });

    // Task selection
    taskSelect.addEventListener('change', () => {
      const taskId = taskSelect.value;
      if (!taskId) { sliderGroup.style.display='none'; saveBtn.disabled=true; return; }
      const task = eligible.find(t => t.id === taskId);
      if (!task) return;
      const currentPct = Math.round(((progressMap[task.id + '_' + poste.numero] ?? task.avancementInitial) || 0) * 100);
      slider.value = currentPct;
      pctEl.textContent = currentPct + '%';
      infoEl.textContent = 'Planifiée P' + task.posteDebut + '→P' + task.posteFin + ' — Avancement actuel : ' + currentPct + '%';
      sliderGroup.style.display = 'block';
      saveBtn.disabled = false;
    });

    slider.addEventListener('input', () => {
      pctEl.textContent = slider.value + '%';
    });

    $('#unplanned-cancel', overlay).onclick = () => overlay.remove();

    saveBtn.onclick = async () => {
      const taskId = taskSelect.value;
      if (!taskId) return;
      const value = parseInt(slider.value) / 100;
      await saveTaskProgress(taskId, value, poste.numero, state.currentChantierId, poste.id);
      overlay.remove();
      // Refresh task list
      const liveMap = state.chantierData ? state.chantierData.progressMap : progressMap;
      const freshItems = Logic.getTasksForPoste(poste.numero, tasks, liveMap, state.showAheadTasks);
      renderTasksContainer(freshItems, true, poste.id, true, state._taskPhotosMap);
      showToast('Avancement enregistré', 'success');
    };

    overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  }

  // ============ MODAL: MODIFIER FICHE CLÔTURÉE ============

  function showReopenPosteModal(poste, chantier, postes) {
    const hasMdp = !!(chantier.motDePasse && chantier.motDePasse.trim());

    const overlay = el('div', 'modal-overlay center');
    overlay.style.zIndex = '600';
    overlay.innerHTML = `
      <div class="modal-sheet" style="max-width:400px;width:100%">
        <div class="modal-title">🔓 Modifier le poste ${poste.numero}</div>

        ${hasMdp ? `
        <div class="alert alert-warn" style="margin-bottom:14px">
          <span class="alert-icon">🔐</span>
          <div>Cette fiche est clôturée. Saisissez le mot de passe encadrant pour la modifier.</div>
        </div>
        <div class="form-group">
          <label>Mot de passe encadrant</label>
          <input type="password" id="reopen-mdp" placeholder="Mot de passe" autocomplete="current-password">
        </div>
        <div id="reopen-error" style="color:#E53935;font-size:13px;margin-bottom:8px;display:none">
          ❌ Mot de passe incorrect.
        </div>` : `
        <div class="alert alert-info" style="margin-bottom:14px">
          <span class="alert-icon">ℹ️</span>
          <div>Aucun mot de passe configuré. La fiche va être déverrouillée pour modification.<br><br>
          Pensez à reconfigurer un mot de passe dans ⚙️ Config chantier.</div>
        </div>`}

        <div class="modal-actions">
          <button class="btn btn-secondary w-full" id="reopen-cancel">Annuler</button>
          <button class="btn btn-warning w-full" id="reopen-ok">🔓 Déverrouiller</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);

    const mdpInput = $('#reopen-mdp', overlay);
    if (mdpInput) {
      mdpInput.focus();
      mdpInput.addEventListener('keydown', (e) => { if(e.key==='Enter') $('#reopen-ok',overlay).click(); });
    }

    $('#reopen-cancel', overlay).onclick = () => overlay.remove();

    $('#reopen-ok', overlay).onclick = async () => {
      // Vérification mot de passe
      if (hasMdp) {
        const saisie = ($('#reopen-mdp', overlay).value || '').trim();
        if (saisie !== chantier.motDePasse.trim()) {
          $('#reopen-error', overlay).style.display = 'block';
          if (mdpInput) { mdpInput.value=''; mdpInput.focus(); }
          return;
        }
      }

      // Déverrouiller le poste
      poste.clos   = false;
      poste.closAt = null;
      await DB.Postes.save(poste);

      // Remettre le currentPosteNum sur ce poste si nécessaire
      if (chantier.currentPosteNum > poste.numero) {
        chantier.currentPosteNum = poste.numero;
        chantier.updatedAt = new Date().toISOString();
        await DB.Chantiers.save(chantier);
      }

      overlay.remove();
      showToast('✅ Poste ' + poste.numero + ' déverrouillé — vous pouvez le modifier', 'success', 3500);

      // Recharger les données et réafficher la fiche en mode édition
      await loadChantierData(chantier.id);
      navigate('poste', { posteNum: poste.numero });
    };

    overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  }

  // ============ MODAL: PHOTOS D'UNE TÂCHE ============

  async function showTaskPhotosViewer(taskId, taskName, posteIdOrPoste, editable) {
    // Accept either a poste object or a posteId string
    const poste = (typeof posteIdOrPoste === 'object' && posteIdOrPoste !== null)
      ? posteIdOrPoste
      : state.currentPoste;
    if (!poste) { showToast('Erreur: poste non trouvé', 'error'); return; }
    showLoading('Chargement photos…');
    const allPhotos = await DB.Photos.getAllForPoste(poste.id);
    const taskPhotos = allPhotos.filter(p => p.type === 'task' && p.taskId === taskId);
    hideLoading();

    if (!taskPhotos.length) {
      showToast('Aucune photo pour cette tâche', 'info');
      return;
    }

    const overlay = el('div', 'modal-overlay center');
    overlay.style.zIndex = '600';
    overlay.innerHTML = `
      <div class="modal-sheet" style="max-width:560px;width:100%;max-height:92vh;overflow-y:auto">
        <div class="modal-handle"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px">
          <div>
            <div class="modal-title" style="margin-bottom:2px">📷 Photos de la tâche</div>
            <div style="font-size:12px;color:#4a6070;font-weight:600">${taskName}</div>
          </div>
          <span class="badge badge-info" style="font-size:12px;flex-shrink:0">${taskPhotos.length} photo${taskPhotos.length>1?'s':''}</span>
        </div>

        <div id="task-photos-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"></div>

        ${editable ? `<button class="btn btn-primary btn-sm btn-block" id="task-add-more-photo" style="margin-bottom:10px">
          📷 Ajouter une autre photo
        </button>` : ''}

        <button class="btn btn-secondary btn-block" id="task-photos-close">Fermer</button>
      </div>`;
    document.body.appendChild(overlay);

    // Afficher les photos
    const grid = $('#task-photos-grid', overlay);
    taskPhotos.forEach(photo => {
      const imgSrc = photo.annotation || photo.data;
      const card = el('div', '');
      card.style.cssText = 'border-radius:10px;overflow:hidden;background:#f0f4f7;border:1.5px solid #d0dbe5;cursor:pointer';
      card.innerHTML = `
        <img src="${imgSrc}" style="width:100%;aspect-ratio:4/3;object-fit:cover;display:block" loading="lazy">
        <div style="padding:6px 8px;display:flex;align-items:center;justify-content:space-between;gap:6px">
          <div style="font-size:11px;color:#4a6070;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
            ${photo.legende || 'Photo'}
          </div>
          ${editable ? `<button class="btn btn-danger btn-sm" data-del-photoid="${photo.id}" style="height:26px;padding:0 8px;font-size:11px;flex-shrink:0">✕</button>` : ''}
        </div>`;

      // Clic sur image → ouvrir viewer/annotation
      card.querySelector('img').onclick = () => {
        overlay.remove();
        showPhotoViewer(photo, editable, poste);
      };

      grid.appendChild(card);
    });

    // Suppression
    if (editable) {
      $$('[data-del-photoid]', overlay).forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const ok = await confirm('Supprimer photo', 'Supprimer cette photo de preuve ?', 'Supprimer', 'btn-danger');
          if (!ok) return;
          await DB.Photos.delete(btn.dataset.delPhotoid);
          // Rafraîchir compteur
          const allUpdated = await DB.Photos.getAllForPoste(poste.id);
          state._taskPhotoCounts = {};
          allUpdated.filter(p=>p.type==='task'&&p.taskId).forEach(p=>{
            state._taskPhotoCounts[p.taskId] = (state._taskPhotoCounts[p.taskId]||0)+1;
          });
          overlay.remove();
          // Mettre à jour le badge dans la liste
          const badgeEl = document.querySelector(`.badge-task-photos[data-taskid="${taskId}"]`);
          const newCount = state._taskPhotoCounts[taskId] || 0;
          if (badgeEl) {
            if (newCount > 0) {
              badgeEl.textContent = '📷 ' + newCount;
            } else {
              badgeEl.remove();
            }
          }
          showToast('Photo supprimée', 'success');
        };
      });

      // Ajouter une autre photo
      const addMoreBtn = $('#task-add-more-photo', overlay);
      if (addMoreBtn) {
        addMoreBtn.onclick = () => {
          overlay.remove();
          showPhotoModal(poste, 'task', taskId, taskName);
        };
      }
    }

    $('#task-photos-close', overlay).onclick = () => overlay.remove();
    overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
  }

  // ============ INIT ============
  return { navigate, renderHome, showToast, showLoading, hideLoading, state };
})();

</script>
<script>
/* ===== SYNC ===== */
/**
 * sync.js — Synchronisation multi-tablettes (offline-first).
 * Enrobe la couche DB (sans la modifier) pour :
 *  - horodater chaque écriture (updatedAt) ;
 *  - transformer les suppressions en suppressions logiques (tombstones) ;
 *  - filer chaque modification dans une file d'attente (outbox) ;
 *  - pousser/tirer les changements vers le serveur dès qu'on est en ligne.
 * Résolution de conflit : dernière écriture gagne (par updatedAt).
 * Curseur de réception : `seq` monotone fourni par le serveur.
 */
const Sync = (() => {
  const SETTINGS_URL = 'sync_server_url';
  // Adresse du serveur de synchro inscrite en dur : chaque tablette est reliée
  // automatiquement, sans configuration. Modifiable via ⚙️ Serveur — une URL
  // enregistrée manuellement sur la tablette reste prioritaire sur ce défaut.
  const DEFAULT_SERVER_URL = 'https://outil-fdp-chantier.onrender.com';
  const cursorKey = (cid) => 'sync_cursor:' + cid;
  const outboxKey = (cid) => 'sync_outbox:' + cid;

  let O = {};            // références originales aux accesseurs DB
  const MAP = {};        // label serveur -> { idField, getRaw, saveRaw }
  let _applying = false;  // true pendant l'application des données reçues (pas de ré-enqueue)
  let _serverUrl = '';
  const _outboxMem = {}; // cid -> Map("store|id" -> {store,id,idField})
  const _timers = {};

  const state = { online: (typeof navigator !== 'undefined' ? navigator.onLine : true), syncing: false, lastSync: null, error: null, pending: 0 };

  // ---------- Réglages ----------
  async function getServerUrl() {
    if (_serverUrl) return _serverUrl;
    _serverUrl = (await DB.Settings.get(SETTINGS_URL, '')) || DEFAULT_SERVER_URL;
    return _serverUrl;
  }
  async function setServerUrl(u) {
    _serverUrl = (u || '').trim().replace(/\/+$/, '');
    await DB.Settings.set(SETTINGS_URL, _serverUrl);
    updateBadge();
    return _serverUrl;
  }
  async function getCursor(cid) { return (await DB.Settings.get(cursorKey(cid), 0)) || 0; }
  async function setCursor(cid, v) { await DB.Settings.set(cursorKey(cid), v); }

  // ---------- Outbox (file d'attente d'envoi) ----------
  async function loadOutbox(cid) {
    if (_outboxMem[cid]) return _outboxMem[cid];
    const arr = (await DB.Settings.get(outboxKey(cid), [])) || [];
    const m = new Map();
    arr.forEach(e => m.set(e.store + '|' + e.id, e));
    _outboxMem[cid] = m;
    return m;
  }
  async function persistOutbox(cid) {
    const m = _outboxMem[cid] || new Map();
    await DB.Settings.set(outboxKey(cid), [...m.values()]);
    await recomputePending();
  }
  async function enqueue(cid, store, idField, id) {
    if (!cid) return;
    const m = await loadOutbox(cid);
    m.set(store + '|' + id, { store, id: String(id), idField });
    await persistOutbox(cid);
    scheduleSync(cid);
  }
  async function recomputePending() {
    let n = 0;
    for (const cid in _outboxMem) n += _outboxMem[cid].size;
    state.pending = n;
    updateBadge();
  }

  // ---------- Enrobage de la couche DB ----------
  function wrapDB() {
    // Sauvegarde des accesseurs originaux
    O = {
      Chantiers: Object.assign({}, DB.Chantiers),
      Postes: Object.assign({}, DB.Postes),
      Tasks: Object.assign({}, DB.Tasks),
      Progress: Object.assign({}, DB.Progress),
      Photos: Object.assign({}, DB.Photos),
      Dosimetry: Object.assign({}, DB.Dosimetry),
    };

    // Table de correspondance label serveur -> accès bas niveau
    MAP.chantiers = { idField: 'id', getRaw: (id) => O.Chantiers.get(id), saveRaw: (r) => O.Chantiers.save(r) };
    MAP.postes    = { idField: 'id', getRaw: (id) => O.Postes.get(id),    saveRaw: (r) => O.Postes.save(r) };
    MAP.tasks     = { idField: 'id', getRaw: (id) => O.Tasks.get(id),     saveRaw: (r) => O.Tasks.save(r) };
    MAP.progress  = { idField: 'key', getRaw: (id) => O.Progress.get(id),  saveRaw: (r) => O.Progress.save(r) };
    MAP.photos    = { idField: 'id', getRaw: (id) => O.Photos.get(id),    saveRaw: (r) => O.Photos.save(r) };
    MAP.dosimetry = { idField: 'id', getRaw: (id) => O.Dosimetry.get(id), saveRaw: (r) => O.Dosimetry.save(r) };

    const stamp = (r) => { if (!_applying) { r.updatedAt = Date.now(); if (r.deleted === undefined) r.deleted = false; } return r; };
    const notDel = (arr) => arr.filter(r => r && !r.deleted);
    const oneNotDel = (r) => (r && r.deleted) ? undefined : r;

    // ---- CHANTIERS ----
    DB.Chantiers.save = async (ch) => { stamp(ch); const res = await O.Chantiers.save(ch); if (!_applying) await enqueue(ch.id, 'chantiers', 'id', ch.id); return res; };
    DB.Chantiers.getAll = async () => notDel(await O.Chantiers.getAll());
    DB.Chantiers.get = async (id) => oneNotDel(await O.Chantiers.get(id));
    DB.Chantiers.delete = async (id) => softDelete('chantiers', id, (id));

    // ---- POSTES ----
    DB.Postes.save = async (p) => { stamp(p); const res = await O.Postes.save(p); if (!_applying) await enqueue(p.chantierId, 'postes', 'id', p.id); return res; };
    DB.Postes.getAll = async (cid) => notDel(await O.Postes.getAll(cid));
    DB.Postes.get = async (id) => oneNotDel(await O.Postes.get(id));
    DB.Postes.delete = async (id) => softDelete('postes', id);

    // ---- TASKS ----
    DB.Tasks.save = async (t) => { stamp(t); const res = await O.Tasks.save(t); if (!_applying) await enqueue(t.chantierId, 'tasks', 'id', t.id); return res; };
    DB.Tasks.getAll = async (cid) => notDel(await O.Tasks.getAll(cid));
    DB.Tasks.get = async (id) => oneNotDel(await O.Tasks.get(id));
    DB.Tasks.bulkSave = async (tasks) => {
      if (!_applying) tasks.forEach(stamp);
      const res = await O.Tasks.bulkSave(tasks);
      if (!_applying) { for (const t of tasks) await enqueue(t.chantierId, 'tasks', 'id', t.id); }
      return res;
    };

    // ---- PROGRESS ----
    DB.Progress.save = async (p) => { stamp(p); const res = await O.Progress.save(p); if (!_applying) await enqueue(p.chantierId, 'progress', 'key', p.key); return res; };
    DB.Progress.get = async (key) => oneNotDel(await O.Progress.get(key));
    DB.Progress.getAllForChantier = async (cid) => notDel(await O.Progress.getAllForChantier(cid));
    DB.Progress.getAllForPoste = async (pid) => notDel(await O.Progress.getAllForPoste(pid));

    // ---- PHOTOS ----
    DB.Photos.save = async (ph) => { stamp(ph); const res = await O.Photos.save(ph); if (!_applying) await enqueue(ph.chantierId, 'photos', 'id', ph.id); return res; };
    DB.Photos.getAll = async (cid) => notDel(await O.Photos.getAll(cid));
    DB.Photos.getAllForPoste = async (pid) => notDel(await O.Photos.getAllForPoste(pid));
    DB.Photos.get = async (id) => oneNotDel(await O.Photos.get(id));
    DB.Photos.delete = async (id) => softDeletePhoto(id);
    DB.Photos.clearChantier = async (cid) => {
      const photos = await O.Photos.getAll(cid);
      let n = 0;
      for (const p of photos) { if (p.deleted) continue; await softDeletePhotoRec(p); n++; }
      return n;
    };

    // ---- DOSIMETRY ----
    DB.Dosimetry.save = async (d) => { stamp(d); const res = await O.Dosimetry.save(d); if (!_applying) await enqueue(d.chantierId, 'dosimetry', 'id', d.id); return res; };
    DB.Dosimetry.getAllForPoste = async (pid) => notDel(await O.Dosimetry.getAllForPoste(pid));
    DB.Dosimetry.getAllForChantier = async (cid) => notDel(await O.Dosimetry.getAllForChantier(cid));
    DB.Dosimetry.delete = async (id) => softDelete('dosimetry', id);

    // ---- SUPPRESSION CASCADE (tombstones, propagée) ----
    DB.deleteFullChantier = async (cid) => {
      const [postes, tasks, progress, photos, dosi, ch] = await Promise.all([
        O.Postes.getAll(cid), O.Tasks.getAll(cid), O.Progress.getAllForChantier(cid),
        O.Photos.getAll(cid), O.Dosimetry.getAllForChantier(cid), O.Chantiers.get(cid),
      ]);
      const now = Date.now();
      const tomb = (r) => Object.assign({}, r, { deleted: true, updatedAt: now });
      const m = await loadOutbox(cid);
      if (ch) { await O.Chantiers.save(tomb(ch)); m.set('chantiers|' + cid, { store: 'chantiers', id: cid, idField: 'id' }); }
      for (const p of postes) { await O.Postes.save(tomb(p)); m.set('postes|' + p.id, { store: 'postes', id: p.id, idField: 'id' }); }
      for (const t of tasks) { await O.Tasks.save(tomb(t)); m.set('tasks|' + t.id, { store: 'tasks', id: t.id, idField: 'id' }); }
      for (const p of progress) { await O.Progress.save(tomb(p)); m.set('progress|' + p.key, { store: 'progress', id: p.key, idField: 'key' }); }
      for (const p of photos) { await O.Photos.save(photoTomb(p, now)); m.set('photos|' + p.id, { store: 'photos', id: p.id, idField: 'id' }); }
      for (const d of dosi) { await O.Dosimetry.save(tomb(d)); m.set('dosimetry|' + d.id, { store: 'dosimetry', id: d.id, idField: 'id' }); }
      await persistOutbox(cid);
      scheduleSync(cid);
      return { postes: postes.length, tasks: tasks.length, progress: progress.length, photos: photos.length, dosi: dosi.length };
    };
  }

  function photoTomb(p, now) {
    return { id: p.id, chantierId: p.chantierId, posteId: p.posteId, type: p.type, taskId: p.taskId || null, legende: p.legende || '', deleted: true, updatedAt: now || Date.now() };
  }

  async function softDelete(label, id) {
    const def = MAP[label];
    const rec = await def.getRaw(id);
    if (!rec) return;
    const tomb = Object.assign({}, rec, { deleted: true, updatedAt: Date.now() });
    await def.saveRaw(tomb);
    await enqueue(tomb.chantierId || (label === 'chantiers' ? id : null), label, def.idField, id);
  }
  async function softDeletePhoto(id) {
    const p = await O.Photos.get(id);
    if (!p) return;
    await softDeletePhotoRec(p);
  }
  async function softDeletePhotoRec(p) {
    const tomb = photoTomb(p, Date.now());
    await O.Photos.save(tomb);
    await enqueue(p.chantierId, 'photos', 'id', p.id);
  }

  // ---------- Construction du payload + application ----------
  async function loadRecord(store, id) {
    const def = MAP[store];
    if (!def) return null;
    return await def.getRaw(id);
  }

  async function applyRecords(cid, recs) {
    _applying = true;
    try {
      for (const r of recs) {
        const def = MAP[r.store];
        if (!def) continue;
        const incoming = Object.assign({}, r.data || {});
        incoming[def.idField] = r.id;
        if (!incoming.chantierId) incoming.chantierId = cid;
        incoming.updatedAt = r.updatedAt;
        incoming.deleted = !!r.deleted;
        const local = await def.getRaw(r.id);
        if (local && (local.updatedAt || 0) > r.updatedAt) continue; // version locale plus récente → gagne
        await def.saveRaw(incoming);
      }
    } finally { _applying = false; }
  }

  // ---------- Moteur de synchronisation ----------
  async function run(cid) {
    const url = await getServerUrl();
    if (!url) return { skipped: 'no-server' };
    if (!navigator.onLine) { state.online = false; updateBadge(); return { skipped: 'offline' }; }
    const ch = await O.Chantiers.get(cid);
    if (!ch || !ch.syncCode) return { skipped: 'no-code' };
    if (state.syncing) return { skipped: 'busy' };

    state.syncing = true; state.error = null; updateBadge();
    try {
      const m = await loadOutbox(cid);
      const pushedKeys = [...m.keys()];
      const records = [];
      for (const e of m.values()) {
        try {
          const rec = await loadRecord(e.store, e.id);
          if (rec) records.push({ store: e.store, id: e.id, updatedAt: rec.updatedAt || Date.now(), deleted: !!rec.deleted, data: rec });
          else records.push({ store: e.store, id: e.id, updatedAt: Date.now(), deleted: true, data: { deleted: true } });
        } catch (errLoad) { console.warn('[Sync] enregistrement ignoré (chargement impossible)', e, errLoad); }
      }
      const since = await getCursor(cid);
      const res = await fetch(url + '/api/sync/' + encodeURIComponent(ch.syncCode), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chantierId: cid, since, records }),
      });
      if (!res.ok) {
        const msg = res.status === 409 ? 'Ce code est déjà utilisé par un autre chantier.' : ('Erreur serveur (HTTP ' + res.status + ')');
        throw new Error(msg);
      }
      const out = await res.json();

      // Retirer de l'outbox uniquement ce qui vient d'être envoyé avec succès
      const m2 = await loadOutbox(cid);
      pushedKeys.forEach(k => m2.delete(k));
      await persistOutbox(cid);

      // Appliquer les données reçues
      let pulled = 0;
      if (out.records && out.records.length) {
        await applyRecords(cid, out.records);
        let maxSeq = since;
        for (const r of out.records) if ((r.seq || 0) > maxSeq) maxSeq = r.seq;
        await setCursor(cid, maxSeq);
        pulled = out.records.length;
      }
      state.lastSync = Date.now();
      updateBadge();
      return { ok: true, applied: out.applied || 0, pulled };
    } catch (err) {
      state.error = err.message;
      updateBadge();
      return { error: err.message };
    } finally {
      state.syncing = false;
      updateBadge();
    }
  }

  async function runAll(opts) {
    const url = await getServerUrl();
    if (!url || !navigator.onLine) return;
    const chantiers = await O.Chantiers.getAll();
    let pulledTotal = 0;
    for (const ch of chantiers) {
      if (ch.deleted || !ch.syncCode) continue;
      const r = await run(ch.id);
      if (r && r.pulled) pulledTotal += r.pulled;
    }
    if (pulledTotal > 0 && opts && opts.refresh) refreshActiveView();
    return pulledTotal;
  }

  function scheduleSync(cid) {
    if (typeof navigator !== 'undefined' && !navigator.onLine) return;
    clearTimeout(_timers[cid]);
    _timers[cid] = setTimeout(async () => {
      const r = await run(cid);
      if (r && r.pulled) refreshActiveView();
    }, 1500);
  }

  // ---------- Rejoindre un chantier par code ----------
  async function join(serverUrl, code) {
    const url = await setServerUrl(serverUrl);
    if (!url) throw new Error('URL du serveur manquante.');
    if (!code) throw new Error('Code de chantier manquant.');
    const res = await fetch(url + '/api/sync/' + encodeURIComponent(code.trim()), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ since: 0, records: [] }),
    });
    if (!res.ok) throw new Error('Erreur serveur (HTTP ' + res.status + ')');
    const out = await res.json();
    if (!out.records || !out.records.length) throw new Error('Aucun chantier trouvé pour ce code.');
    const chRec = out.records.find(r => r.store === 'chantiers' && !r.deleted);
    if (!chRec) throw new Error('Chantier introuvable (ou supprimé) pour ce code.');
    const cid = chRec.id;
    await applyRecords(cid, out.records);
    let maxSeq = 0;
    out.records.forEach(r => { if ((r.seq || 0) > maxSeq) maxSeq = r.seq; });
    await setCursor(cid, maxSeq);
    return cid;
  }

  // ---------- Rafraîchir la vue active après réception ----------
  function refreshActiveView() {
    if (typeof UI === 'undefined') return;
    const v = UI.state.activeView;
    try {
      if (v === 'home') UI.navigate('home');
      else if (v === 'chantier') UI.navigate('chantier');
      else if (v === 'global') UI.navigate('global');
      else if (v === 'exports') UI.navigate('exports');
      else if (v === 'poste' && UI.state.currentPosteNum) UI.navigate('poste', { posteNum: UI.state.currentPosteNum });
    } catch (e) { /* ignore */ }
  }

  // ---------- Badge de statut (header) ----------
  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
  }
  function updateBadge() {
    const host = document.getElementById('header-actions');
    if (!host) return;
    let icon, color, label;
    if (!state.online) { icon = '⚡'; color = '#9aa7b0'; label = 'Hors ligne'; }
    else if (state.syncing) { icon = '⏳'; color = '#FFCA00'; label = 'Synchro…'; }
    else if (state.error) { icon = '⚠️'; color = '#FF9600'; label = 'Erreur'; }
    else if (state.pending > 0) { icon = '↻'; color = '#FFCA00'; label = state.pending + ' en attente'; }
    else { icon = '✓'; color = '#76C512'; label = state.lastSync ? ('Sync ' + fmtTime(state.lastSync)) : 'À jour'; }
    host.innerHTML = '<button id="sync-badge-btn" title="Synchroniser maintenant" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);border:none;color:#fff;font-size:11px;font-weight:700;padding:6px 10px;border-radius:8px;cursor:pointer">'
      + '<span style="color:' + color + ';font-size:13px">' + icon + '</span><span>' + label + '</span></button>';
    const btn = document.getElementById('sync-badge-btn');
    if (btn) btn.onclick = async () => { await runAll({ refresh: true }); };
  }

  // ---------- Widgets UI (montés par renderHome / renderChantierHome) ----------
  async function mountHome() {
    const host = document.getElementById('sync-home');
    if (!host) return;
    const url = await getServerUrl();
    host.innerHTML =
      '<div class="card" style="border:1.5px solid #0059CE;background:#f5f9ff">'
      + '<div class="card-title" style="margin-bottom:8px"><span class="icon">🔄</span> Synchronisation</div>'
      + (url
        ? '<div style="font-size:12px;color:#4a6070;margin-bottom:8px">Serveur : <strong style="word-break:break-all">' + url + '</strong></div>'
        : '<div class="alert alert-warn" style="margin-bottom:8px"><span class="alert-icon">⚙️</span><div style="font-size:12px">Aucun serveur configuré — l\'app fonctionne en local. Configurez l\'adresse du serveur pour synchroniser entre tablettes.</div></div>')
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
      + '<button class="btn btn-secondary btn-sm" id="sync-cfg-btn">⚙️ Serveur</button>'
      + '<button class="btn btn-secondary btn-sm" id="sync-join-btn">🔗 Rejoindre un chantier</button>'
      + '</div>'
      + (url ? '<button class="btn btn-primary btn-sm btn-block" id="sync-now-btn" style="margin-top:8px">🔄 Synchroniser maintenant</button>' : '')
      + '</div>';
    const cfg = document.getElementById('sync-cfg-btn');
    if (cfg) cfg.onclick = () => showServerModal();
    const join = document.getElementById('sync-join-btn');
    if (join) join.onclick = () => showJoinModal();
    const now = document.getElementById('sync-now-btn');
    if (now) now.onclick = async () => { UI.showToast('Synchronisation…', 'info'); const n = await runAll({ refresh: true }); UI.showToast(n ? ('Reçu ' + n + ' mise(s) à jour') : 'À jour', 'success'); };
  }

  async function mountChantier(cid) {
    const host = document.getElementById('sync-chantier');
    if (!host) return;
    const ch = await O.Chantiers.get(cid);
    if (!ch) return;
    const url = await getServerUrl();
    host.innerHTML =
      '<div class="card" style="background:linear-gradient(135deg,#0059CE,#003a87);color:#fff">'
      + '<div style="font-size:11px;font-weight:700;color:#a8c8f0;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px">Code de partage du chantier</div>'
      + '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
      + '<div style="font-size:26px;font-weight:900;letter-spacing:2px;font-family:monospace">' + (ch.syncCode || '—') + '</div>'
      + '<button class="btn btn-light btn-sm" id="sync-copy-code" style="background:rgba(255,255,255,0.2);color:#fff;border:none">📋 Copier</button>'
      + '</div>'
      + '<div style="font-size:12px;color:#cfe0f5;margin-top:6px">Donnez ce code (et l\'adresse du serveur) aux autres tablettes pour suivre le même chantier.</div>'
      + (url ? '<button class="btn btn-light btn-sm btn-block" id="sync-chantier-now" style="margin-top:10px;background:rgba(255,255,255,0.92);color:#002439;border:none">🔄 Synchroniser maintenant</button>'
             : '<div class="alert alert-warn" style="margin-top:10px"><span class="alert-icon">⚙️</span><div style="font-size:12px">Configurez le serveur (écran Accueil) pour activer la synchro.</div></div>')
      + '</div>';
    const copy = document.getElementById('sync-copy-code');
    if (copy) copy.onclick = async () => { try { await navigator.clipboard.writeText(ch.syncCode); UI.showToast('Code copié', 'success'); } catch (e) { UI.showToast('Code : ' + ch.syncCode, 'info'); } };
    const now = document.getElementById('sync-chantier-now');
    if (now) now.onclick = async () => { UI.showToast('Synchronisation…', 'info'); const r = await run(cid); if (r.error) UI.showToast('Erreur : ' + r.error, 'error'); else { UI.showToast(r.pulled ? ('Reçu ' + r.pulled + ' mise(s) à jour') : 'À jour', 'success'); refreshActiveView(); } };
  }

  // ---------- Modales serveur / rejoindre ----------
  function showServerModal() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML =
      '<div class="modal-sheet"><div class="modal-handle"></div>'
      + '<div class="modal-title">⚙️ Adresse du serveur de synchro</div>'
      + '<div class="form-group"><label>URL du serveur (Render)</label>'
      + '<input type="url" id="srv-url" placeholder="https://mon-serveur.onrender.com" value="' + (_serverUrl || '') + '" inputmode="url" autocomplete="off"></div>'
      + '<div style="font-size:12px;color:#4a6070;margin-bottom:10px">Exemple : https://ineo-chantier-sync.onrender.com — laissez vide pour rester 100% local.</div>'
      + '<div class="modal-actions"><button class="btn btn-secondary w-full" id="srv-cancel">Annuler</button><button class="btn btn-primary w-full" id="srv-save">💾 Enregistrer</button></div>'
      + '</div>';
    document.body.appendChild(overlay);
    overlay.querySelector('#srv-cancel').onclick = () => overlay.remove();
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.querySelector('#srv-save').onclick = async () => {
      const v = overlay.querySelector('#srv-url').value;
      await setServerUrl(v);
      overlay.remove();
      UI.showToast('Serveur enregistré', 'success');
      mountHome();
      if (navigator.onLine && _serverUrl) runAll({ refresh: true });
    };
  }

  function showJoinModal() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML =
      '<div class="modal-sheet"><div class="modal-handle"></div>'
      + '<div class="modal-title">🔗 Rejoindre un chantier</div>'
      + '<div class="form-group"><label>URL du serveur</label>'
      + '<input type="url" id="join-url" placeholder="https://mon-serveur.onrender.com" value="' + (_serverUrl || '') + '" inputmode="url" autocomplete="off"></div>'
      + '<div class="form-group"><label>Code du chantier</label>'
      + '<input type="text" id="join-code" placeholder="ex: A1B2C3D4" autocapitalize="characters" autocomplete="off" style="text-transform:uppercase;font-family:monospace;font-size:18px;letter-spacing:2px"></div>'
      + '<div class="modal-actions"><button class="btn btn-secondary w-full" id="join-cancel">Annuler</button><button class="btn btn-primary w-full" id="join-go">🔗 Rejoindre</button></div>'
      + '</div>';
    document.body.appendChild(overlay);
    overlay.querySelector('#join-cancel').onclick = () => overlay.remove();
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.querySelector('#join-go').onclick = async () => {
      const url = overlay.querySelector('#join-url').value;
      const code = overlay.querySelector('#join-code').value;
      if (!code.trim()) { UI.showToast('Saisissez un code', 'warning'); return; }
      try {
        UI.showLoading('Connexion au chantier…');
        const cid = await join(url, code);
        UI.hideLoading();
        overlay.remove();
        UI.showToast('Chantier rejoint !', 'success');
        UI.state.currentChantierId = cid;
        UI.navigate('chantier');
      } catch (e) { UI.hideLoading(); UI.showToast('Échec : ' + e.message, 'error'); }
    };
  }

  // ---------- Initialisation ----------
  async function init() {
    wrapDB();
    await getServerUrl();
    // recalcul du nombre d'éléments en attente (toutes chantiers)
    try {
      const chs = await O.Chantiers.getAll();
      for (const ch of chs) { if (ch && ch.id) await loadOutbox(ch.id); }
      await recomputePending();
    } catch (e) { /* ignore */ }

    window.addEventListener('online', () => { state.online = true; updateBadge(); runAll({ refresh: true }); });
    window.addEventListener('offline', () => { state.online = false; updateBadge(); });
    updateBadge();

    // Synchro périodique (toutes les 60 s) si en ligne
    setInterval(() => { if (navigator.onLine && _serverUrl) runAll({ refresh: true }); }, 60000);

    // Première synchro au démarrage
    if (navigator.onLine && _serverUrl) setTimeout(() => runAll({ refresh: true }), 1200);
  }

  return { init, run, runAll, join, mountHome, mountChantier, setServerUrl, getServerUrl, showServerModal, showJoinModal, state, _wrapDB: wrapDB };
})();
window.Sync = Sync;

</script>

// Register SW from inline blob (works from file:// and http://)
(function registerInlineSW() {
  // Le Service Worker ne fonctionne que sur http:// ou https://.
  // Depuis file://, c'est une restriction de sécurité normale — aucune action requise.
  const proto = location.protocol;
  if (proto !== 'http:' && proto !== 'https:') return; // Silencieux sur file://
  if (!('serviceWorker' in navigator)) return;
  try {
    const swCode = `
const CACHE='ineo-v1';
self.addEventListener('install',e=>{e.waitUntil(self.skipWaiting());});
self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});
`;
    const blob = new Blob([swCode], {type:'application/javascript'});
    const url  = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).then(() => {
      console.log('[SW] Enregistré');
    }).catch(() => {}); // Silencieux en cas d'erreur
  } catch(e) {} // Silencieux
})();

/**
 * app.js — Point d'entrée de l'application
 * Initialisation, compatibilité, routing
 */

const App = (() => {

  // ============ COMPATIBILITÉ ============
  function checkCompat() {
    const issues = [];
    if (!window.indexedDB) issues.push('IndexedDB non disponible — stockage impossible');
    if (!window.caches) issues.push('Cache API non disponible — mode offline limité');
    if (!navigator.serviceWorker) issues.push('Service Worker non disponible — pas d\'installation PWA');
    if (typeof Blob === 'undefined') issues.push('Blob API manquante — exports impossibles');

    const banner = document.getElementById('compat-banner');
    if (issues.length && banner) {
      banner.textContent = '⚠️ ' + issues[0] + (issues.length > 1 ? ` (+${issues.length-1} autre(s))` : '');
      banner.classList.add('show');
      console.warn('Compatibilité:', issues);
    }

    // Camera check — sur Windows, la webcam ou appareil photo externe peut être utilisé
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      console.info('Camera API non disponible — utilisation de <input type=file> en fallback (normal sur Windows depuis file://)');
    }

    return issues.length === 0;
  }

  // ============ SERVICE WORKER ============
  async function registerSW() {
    if (!('serviceWorker' in navigator)) return;
    try {
      const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
      console.log('[SW] Enregistré:', reg.scope);

      // Notifier l'utilisateur si mise à jour disponible
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            UI.showToast('Mise à jour disponible — rechargez la page', 'info', 5000);
          }
        });
      });
    } catch (err) {
      // Silencieux — SW non disponible depuis file://
    }
  }

  // ============ NAVIGATION BAS ============
  function initBottomNav() {
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const view = btn.dataset.view;
        if (!view) return;
        // Certaines vues nécessitent un chantier actif
        if (['poste','global','exports'].includes(view) && !UI.state.currentChantierId) {
          UI.showToast('Ouvrez d\'abord un chantier', 'warning');
          return;
        }
        if (view === 'poste' && UI.state.currentChantierId) {
          const cd = UI.state.chantierData;
          const posteNum = cd?.chantier?.currentPosteNum || 1;
          UI.navigate('poste', { posteNum });
        } else {
          UI.navigate(view);
        }
      });
    });
  }

  // ============ HEADER ACTIONS ============
  function initHeaderActions() {
    // Bouton retour accueil dans header
    const logoArea = document.getElementById('app-logo-btn');
    if (logoArea) {
      logoArea.addEventListener('click', () => {
        if (UI.state.activeView !== 'home') {
          UI.navigate('home');
        }
      });
    }
  }

  // ============ EMPÊCHER LE ZOOM DOUBLE-TAP ============
  function preventDoubleTapZoom() {
    let lastTap = 0;
    document.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTap < 300) {
        e.preventDefault();
      }
      lastTap = now;
    }, { passive: false });
  }

  // ============ WAKE LOCK (garder l'écran allumé) ============
  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      const lock = await navigator.wakeLock.request('screen');
      console.log('[WakeLock] Activé');
      // Re-acquire si page redevient visible
      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible') {
          try { await navigator.wakeLock.request('screen'); } catch(_) {}
        }
      });
    } catch (err) {
      console.info('[WakeLock] Non disponible:', err.message);
    }
  }

  // ============ INIT ============
  async function init() {
    console.log('[Ineo Chantier] Démarrage...');

    // 1. Vérification compatibilité
    checkCompat();

    // 2. Ouvrir la base IndexedDB
    try {
      await DB.open();
      console.log('[DB] IndexedDB ouverte');
    } catch (err) {
      alert('Erreur critique : impossible d\'ouvrir la base de données locale.\n' + err.message);
      return;
    }

    // 2b. Demander un stockage persistant (réduit le risque d'éviction
    //     des données du chantier par le navigateur Android hors-ligne)
    if (navigator.storage && navigator.storage.persist) {
      try {
        const already = await navigator.storage.persisted();
        if (!already) {
          const granted = await navigator.storage.persist();
          console.log('[Storage] Persistant :', granted);
        }
      } catch (_) { /* non bloquant */ }
    }

    // 2c. Initialiser la synchronisation multi-tablettes (offline-first)
    if (window.Sync) { try { await Sync.init(); } catch(e){ console.warn('[Sync] init échouée:', e); } }

    // 3. Service worker
    await registerSW();

    // 4. Wake lock (optionnel)
    requestWakeLock();

    // 5. Navigation
    initBottomNav();
    initHeaderActions();

    // 6. Anti double-tap zoom
    preventDoubleTapZoom();

    // 7. Vue initiale
    UI.navigate('home');

    // 8. Masquer le splash screen si présent
    const splash = document.getElementById('splash');
    if (splash) {
      splash.style.opacity = '0';
      setTimeout(() => splash.remove(), 400);
    }

    console.log('[Ineo Chantier] Prêt.');
  }

  // Lancement au chargement DOM
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  return { init };
})();
